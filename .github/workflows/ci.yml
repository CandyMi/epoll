name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["master", "main"]

jobs:
  # ── Linux ─────────────────────────────────────
  linux-gcc:
    name: "Linux · GCC · kernel epoll"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cmake -S . -B build -DCMAKE_C_COMPILER=gcc
      - run: cmake --build build
      - run: ./build/main

  linux-clang:
    name: "Linux · Clang · kernel epoll"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cmake -S . -B build -DCMAKE_C_COMPILER=clang
      - run: cmake --build build
      - run: ./build/main

  linux-select:
    name: "Linux · GCC · select fallback (uepoll)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p build && gcc -DNO_NATIVE_EPOLL=1 -DEPOLL_BACKEND_SELECT=1 -I include/epoll src/uepoll.c test/main.c -o build/select_main
      - run: ./build/select_main

  linux-pepoll:
    name: "Linux · GCC · poll fallback (pepoll)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p build && gcc -DNO_NATIVE_EPOLL=1 -DEPOLL_BACKEND_POLL=1 -I include/epoll src/pepoll.c test/main.c -o build/poll_main
      - run: ./build/poll_main

  # ── macOS (pepoll — default) ─────────────────
  macos-pepoll:
    name: "macOS · Clang · poll (pepoll)"
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: cmake -S . -B build
      - run: cmake --build build
      - run: ./build/main

  # ── macOS (kqueue — EPFD_POLL=OFF) ────────────
  macos-kqueue:
    name: "macOS · Clang · kqueue (kepoll)"
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: cmake -S . -B build -DEPFD_POLL=OFF
      - run: cmake --build build
      - run: ./build/main

  # ── Windows ───────────────────────────────────
  windows-msvc:
    name: "Windows · MSVC · IOCP (wepoll)"
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
      - run: cmake -S . -B build
      - run: cmake --build build --config Release
      - run: build\Release\main.exe

  windows-clang:
    name: "Windows · ClangCL · IOCP (wepoll)"
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
      - run: cmake -S . -B build -T ClangCL
      - run: cmake --build build --config Release
      - run: build\Release\main.exe

  # ── ASAN: Linux (kernel epoll) ───────────────
  linux-asan-kernel:
    name: "Linux · GCC · ASAN · kernel epoll"
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cmake -S . -B build -DCMAKE_C_COMPILER=gcc -DENABLE_ASAN=ON
      - run: cmake --build build
      - run: timeout 120 ./build/main

  # ── ASAN: Linux (pepoll fallback) ────────────
  linux-asan-pepoll:
    name: "Linux · GCC · ASAN · poll fallback (pepoll)"
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p build && gcc -DNO_NATIVE_EPOLL=1 -DEPOLL_BACKEND_POLL=1 -I include/epoll src/pepoll.c test/main.c -o build/asan_poll_main -fsanitize=address -g -O1 -fno-omit-frame-pointer
      - run: timeout 120 ./build/asan_poll_main

  # ── ASAN: macOS (pepoll) ─────────────────────
  macos-asan-pepoll:
    name: "macOS · Clang · ASAN · poll (pepoll)"
    timeout-minutes: 5
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: cmake -S . -B build -DCMAKE_C_COMPILER=clang -DENABLE_ASAN=ON
      - run: cmake --build build
      - run: ./build/main

  # ── ASAN: macOS (kqueue) ──────────────────────
  macos-asan-kqueue:
    name: "macOS · Clang · ASAN · kqueue (kepoll)"
    timeout-minutes: 5
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: cmake -S . -B build -DCMAKE_C_COMPILER=clang -DEPFD_POLL=OFF -DENABLE_ASAN=ON
      - run: cmake --build build
      - run: ./build/main

  # ── TSAN: Linux (pepoll fallback) ────────────
  linux-tsan-pepoll:
    name: "Linux · GCC · TSAN · poll fallback (pepoll)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p build && gcc -DNO_NATIVE_EPOLL=1 -DEPOLL_BACKEND_POLL=1 -I include/epoll src/pepoll.c test/main.c -o build/tsan_poll_main -fsanitize=thread -g -O1 -fno-omit-frame-pointer -lpthread
      - run: ./build/tsan_poll_main

  windows-mingw:
    name: "Windows · MinGW (GCC) · IOCP (wepoll)"
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-make
      - run: cmake -S . -B build -G "MinGW Makefiles" -DCMAKE_C_COMPILER=gcc
      - run: cmake --build build
      - run: ./build/main.exe
